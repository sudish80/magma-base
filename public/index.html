          ed.classList.remove('open');
          openPath = null;
        });

        // ─── Find in Note ─────────────────────────────────────────
        const findOverlay = document.getElementById('find-overlay');
        const findInput = document.getElementById('find-input');
        const findCount = document.getElementById('find-count');
        const findPrev = document.getElementById('find-prev');
        const findNext = document.getElementById('find-next');
        const findClose = document.getElementById('find-close');
        let findMatches = [];
        let findIdx = -1;

        function showFind() {
          findOverlay.classList.add('show');
          findInput.value = '';
          findCount.textContent = '';
          findMatches = [];
          findIdx = -1;
          setTimeout(() => findInput.focus(), 50);
        }

        function hideFind() {
          findOverlay.classList.remove('show');
          clearHighlights();
        }

        function clearHighlights() {
          edPreview.querySelectorAll('.hl-match, .hl-active').forEach(el => {
            const parent = el.parentNode;
            if (parent) {
              parent.replaceChild(document.createTextNode(el.textContent), el);
              parent.normalize();
            }
          });
        }

        function doFind() {
          const q = findInput.value.trim();
          if (!q) { findCount.textContent = ''; clearHighlights(); findMatches = []; return; }
          clearHighlights();
          const container = edPreview;
          const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
          const textNodes = [];
          while (walker.nextNode()) textNodes.push(walker.currentNode);
          findMatches = [];
          const lower = q.toLowerCase();
          textNodes.forEach(node => {
            const txt = node.textContent;
            const idx = txt.toLowerCase().indexOf(lower);
            if (idx === -1) return;
            const span = document.createElement('span');
            span.className = 'hl-match';
            span.textContent = txt.substring(idx, idx + q.length);
            const after = txt.substring(idx + q.length);
            const before = txt.substring(0, idx);
            const frag = document.createDocumentFragment();
            frag.appendChild(document.createTextNode(before));
            frag.appendChild(span);
            if (after) frag.appendChild(document.createTextNode(after));
            node.parentNode.replaceChild(frag, node);
            findMatches.push(span);
          });
          if (findMatches.length === 0) {
            findCount.textContent = 'No matches';
            findIdx = -1;
          } else {
            findIdx = 0;
            updateFindHighlight();
            findCount.textContent = `1/${findMatches.length}`;
          }
        }

        function updateFindHighlight() {
          findMatches.forEach((el,i) => {
            el.className = i === findIdx ? 'hl-active' : 'hl-match';
            if (i === findIdx) el.scrollIntoView({ block: 'center' });
          });
        }

        findInput.addEventListener('input', doFind);
        findInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (e.shiftKey) findPrev.click(); else findNext.click(); } });
        findNext.addEventListener('click', () => { if (findMatches.length) { findIdx = (findIdx + 1) % findMatches.length; updateFindHighlight(); findCount.textContent = `${findIdx+1}/${findMatches.length}`; } });
        findPrev.addEventListener('click', () => { if (findMatches.length) { findIdx = (findIdx - 1 + findMatches.length) % findMatches.length; updateFindHighlight(); findCount.textContent = `${findIdx+1}/${findMatches.length}`; } });
        findClose.addEventListener('click', hideFind);
        edFindBtn.addEventListener('click', showFind);
        edTocBtn.addEventListener('click', () => { edToc.classList.toggle('show'); });

        // ─── Focus Graph ─────────────────────────────────────────
        let focusNote = null;
        document.getElementById('ed-focus-btn').addEventListener('click', async () => {
          if (!openPath) return;
          if (focusNote === openPath) {
            focusNote = null;
            document.getElementById('ed-focus-btn').style.background = '';
            buildGraph(files, edges);
            return;
          }
          focusNote = openPath;
          document.getElementById('ed-focus-btn').style.background = 'var(--accent-muted)';
          const f = fileMap.get(openPath);
          if (!f) return;
          const linkedPaths = new Set([openPath]);
          edges.forEach(e => {
            if (e.source === openPath) linkedPaths.add(e.target);
            if (e.target === openPath) linkedPaths.add(e.source);
          });
          const focusFiles = files.filter(fi => linkedPaths.has(fi.path));
          const focusEdges = edges.filter(e => linkedPaths.has(e.source) && linkedPaths.has(e.target));
          buildGraph(focusFiles, focusEdges);
          showToast(`Focus: ${f.name} (${focusFiles.length} nodes)`);
        });

        // ─── Search Highlight in Preview ─────────────────────────

        // ─── Markdown Toolbar ────────────────────────────────────
        document.querySelectorAll('#md-toolbar button[data-cmd]').forEach(btn => {
          btn.addEventListener('click', () => {
            if (!editMode) { edModeBtn.click(); setTimeout(() => { applyMdCmd(btn); }, 100); }
            else { applyMdCmd(btn); }
          });
        });
        function applyMdCmd(btn) {
          const ta = edTextarea;
          const cmd = btn.dataset.cmd;
          const start = ta.selectionStart;
          const end = ta.selectionEnd;
          const sel = ta.value.substring(start, end);
          let ins;
          if (cmd === '---') ins = '\n\n---\n\n';
          else if (cmd === '```\n') ins = '\n```\n' + sel + '\n```\n';
          else if (cmd === '[] ') ins = '- [ ] ';
          else ins = cmd + sel + (sel ? cmd : '');
          ta.focus();
          document.execCommand('insertText', false, ins);
          ta.dispatchEvent(new Event('input'));
        }

        // ─── Command Palette ─────────────────────────────────────
        const cmdPalette = document.getElementById('cmd-palette');
        const cmdInput = document.getElementById('cmd-input');
        const cmdResults = document.getElementById('cmd-results');
        const cmds = [
          { id: 'new-note', label: 'New Note', keys: 'Ctrl+N', action: () => newBtn.click() },
          { id: 'toggle-sidebar', label: 'Toggle Sidebar', keys: 'Ctrl+B', action: () => sbBtn.click() },
          { id: 'toggle-theme', label: 'Toggle Theme', keys: '', action: () => themeBtn.click() },
          { id: 'fullscreen', label: 'Toggle Fullscreen', keys: 'F11', action: () => document.getElementById('fs-btn').click() },
          { id: 'focus-graph', label: 'Focus Graph on Current Note', keys: '', action: () => document.getElementById('ed-focus-btn').click() },
          { id: 'close-editor', label: 'Close Editor', keys: 'Esc', action: () => { ed.classList.remove('open'); openPath = null; } },
        ];
        let cmdSelectedIdx = -1;

        function showCmdPalette() {
          cmdPalette.classList.add('show');
          cmdInput.value = '';
          cmdResults.innerHTML = '';
          cmdSelectedIdx = -1;
          renderCmds(cmds);
          setTimeout(() => cmdInput.focus(), 50);
        }

        function hideCmdPalette() { cmdPalette.classList.remove('show'); }

        function renderCmds(list) {
          cmdResults.innerHTML = list.map((c, i) =>
            `<div class="cmd-item${i === cmdSelectedIdx ? ' selected' : ''}" data-idx="${i}"><span>${c.label}</span>${c.keys ? `<span class="cmd-key">${c.keys}</span>` : ''}</div>`
          ).join('');
          cmdResults.querySelectorAll('.cmd-item').forEach(el => {
            el.addEventListener('click', () => { hideCmdPalette(); cmds[parseInt(el.dataset.idx)].action(); });
          });
        }

        cmdInput.addEventListener('input', () => {
          const q = cmdInput.value.toLowerCase();
          cmdSelectedIdx = -1;
          const filtered = q ? cmds.filter(c => c.label.toLowerCase().includes(q)) : cmds;
          renderCmds(filtered);
        });
        cmdInput.addEventListener('keydown', e => {
          if (e.key === 'ArrowDown') { e.preventDefault(); const items = cmdResults.querySelectorAll('.cmd-item'); if (items.length) { cmdSelectedIdx = (cmdSelectedIdx + 1) % items.length; items.forEach((el,i) => el.classList.toggle('selected', i === cmdSelectedIdx)); } }
          if (e.key === 'ArrowUp') { e.preventDefault(); const items = cmdResults.querySelectorAll('.cmd-item'); if (items.length) { cmdSelectedIdx = (cmdSelectedIdx - 1 + items.length) % items.length; items.forEach((el,i) => el.classList.toggle('selected', i === cmdSelectedIdx)); } }
          if (e.key === 'Enter' && cmdSelectedIdx >= 0) { e.preventDefault(); const items = cmdResults.querySelectorAll('.cmd-item'); if (items[cmdSelectedIdx]) { hideCmdPalette(); cmds[parseInt(items[cmdSelectedIdx].dataset.idx)].action(); } }
          if (e.key === 'Escape') hideCmdPalette();
        });

        document.addEventListener('keydown', e => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); showCmdPalette(); }
          if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); newBtn.click(); }
          if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); sbBtn.click(); }
        });
        function highlightInPreview(term) {
          if (!term) return;
          const q = term.toLowerCase();
          const container = edPreview;
          const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach(node => {
            const txt = node.textContent;
            const idx = txt.toLowerCase().indexOf(q);
            if (idx === -1) return;
            const span = document.createElement('span');
            span.className = 'hl-match';
            span.textContent = txt.substring(idx, idx + q.length);
            const frag = document.createDocumentFragment();
            frag.appendChild(document.createTextNode(txt.substring(0, idx)));
            frag.appendChild(span);
            const after = txt.substring(idx + q.length);
            if (after) frag.appendChild(document.createTextNode(after));
            node.parentNode.replaceChild(frag, node);
          });
        }

        // ─── Sidebar ─────────────────────────────────────────────
        const sb=document.getElementById('sidebar');
        const sbBtn=document.getElementById('sidebar-btn');
        const sbSearch=document.getElementById('sidebar-search');
        const fileListEl=document.getElementById('file-list');
        const vaultNameEl=document.getElementById('vault-name');
        const fileCountEl=document.getElementById('file-count');
        const newBtn=document.getElementById('btn-new');

        sbBtn.addEventListener('click',()=>sb.classList.toggle('open'));
        document.getElementById('fs-btn').addEventListener('click',()=>{
          if(!document.fullscreenElement){document.documentElement.requestFullscreen();}
          else{document.exitFullscreen();}
        });

        // ─── Drag to Resize Sidebar ──────────────────────────
        const resizeHandle = document.getElementById('sidebar-resize');
        resizeHandle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          resizeHandle.classList.add('dragging');
          const startX = e.clientX;
          const startW = sb.offsetWidth;
          function onMove(ev) {
            const w = Math.max(160, Math.min(500, startW + ev.clientX - startX));
            sb.style.width = w + 'px';
            resizeHandle.style.left = w + 'px';
          }
          function onUp() {
            resizeHandle.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        // ─── Vault folder picker ────────────────────────────────
        document.getElementById('btn-vault').addEventListener('click', async () => {
          const input = document.createElement('input');
          input.type = 'file';
          input.setAttribute('webkitdirectory', '');
          input.style.display = 'none';
          document.body.appendChild(input);
          input.addEventListener('change', async () => {
            document.body.removeChild(input);
            const filesList = input.files;
            if (!filesList || filesList.length === 0) return;
            const mdFiles = [];
            for (let i = 0; i < filesList.length; i++) {
              const file = filesList[i];
              if (file.name.endsWith('.md')) {
                mdFiles.push({ name: file.name, file });
              }
            }
            if (mdFiles.length === 0) { showToast('No .md files found', '⚠️'); return; }
            for (const mf of mdFiles) {
              const content = await mf.file.text();
              const safeName = mf.name.replace(/\.md$/, '');
              try {
                await API.post('/api/files', { name: safeName, content });
              } catch (e) {
                const existing = files.find(f => f.name === safeName);
                if (existing) {
                  await API.put('/api/files/' + encodeURIComponent(existing.path), { content });
                }
              }
            }
            await loadData();
            showToast(`Loaded ${mdFiles.length} notes from folder`);
          });
          input.click();
        });

        function renderFileList(filter) {
          fileListEl.innerHTML='';
          const q=(filter||'').toLowerCase();
          let count=0;
          const tree = {};
          files.forEach(f => {
            if(q&&!f.name.toLowerCase().includes(q)) return;
            if(selectedTag && (!f.tags || !f.tags.includes(selectedTag))) return;
            count++;
            const parts = f.path.split(/[\\/]/);
            let node = tree;
            for (let i = 0; i < parts.length - 1; i++) {
              if (!node._children) node._children = {};
              if (!node._children[parts[i]]) node._children[parts[i]] = {};
              node = node._children[parts[i]];
            }
            if (!node._files) node._files = [];
            node._files.push(f);
          });
          if (count === 0) { fileCountEl.textContent='0 notes'; return; }

          function renderNode(node, level) {
            if (node._children) {
              Object.keys(node._children).sort().forEach(dir => {
                const div = document.createElement('div'); div.className = 'file-tree-folder';
                const hdr = document.createElement('div'); hdr.className = 'ft-folder-hdr';
                hdr.innerHTML = `<span class="ft-arrow open">▶</span> ${dir}`;
                const children = document.createElement('div'); children.className = 'ft-children';
                hdr.addEventListener('click', () => {
                  children.classList.toggle('collapsed');
                  hdr.querySelector('.ft-arrow').classList.toggle('open');
                });
                div.appendChild(hdr);
                renderNodeInto(node._children[dir], level + 1, children);
                div.appendChild(children);
                fileListEl.appendChild(div);
              });
            }
            if (node._files) {
              node._files.sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                const el=document.createElement('div');el.className='file-item';
                if(f.path===openPath)el.classList.add('active');
                el.dataset.path=f.path;
                const bl=f.links?f.links.length:0;
                const orphanLabel = f._orphan ? '<span class="fi-orphan" title="No connections">○</span>' : '';
                el.innerHTML=`<span class="fi-icon">📄</span><span class="fi-name">${f.name}</span>${bl?`<span class="fi-links">${bl}→</span>`:''}${orphanolLabel}`;
                el.addEventListener('click',()=>openNote(f.path));
                if (level > 0) el.style.paddingLeft = (24 + level * 12) + 'px';
                fileListEl.appendChild(el);
              });
            }
          }

          function renderNodeInto(node, level, container) {
            if (node._children) {
              Object.keys(node._children).sort().forEach(dir => {
                const div = document.createElement('div'); div.className = 'file-tree-folder';
                const hdr = document.createElement('div'); hdr.className = 'ft-folder-hdr';
                hdr.innerHTML = `<span class="ft-arrow open">▶</span> ${dir}`;
                const children = document.createElement('div'); children.className = 'ft-children';
                hdr.addEventListener('click', () => {
                  children.classList.toggle('collapsed');
                  hdr.querySelector('.ft-arrow').classList.toggle('open');
                });
                div.appendChild(hdr);
                renderNodeInto(node._children[dir], level + 1, children);
                div.appendChild(children);
                container.appendChild(div);
              });
            }
            if (node._files) {
              node._files.sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                const el=document.createElement('div');el.className='file-item';
                if(f.path===openPath)el.classList.add('active');
                el.dataset.path=f.path;
                const bl=f.links?f.links.length:0;
                const orphanLabel = f._orphan ? '<span class="fi-orphan" title="No connections">○</span>' : '';
                el.innerHTML=`<span class="fi-icon">📄</span><span class="fi-name">${f.name}</span>${bl?`<span class="fi-links">${bl}→</span>`:''}${orphanolLabel}`;
                el.addEventListener('click',()=>openNote(f.path));
                el.style.paddingLeft = (24 + level * 12) + 'px';
                container.appendChild(el);
              });
            }
          }

          const hasDirs = tree._children && Object.keys(tree._children).length > 0;
          if (hasDirs) {
            renderNode(tree, 0);
          } else {
            // Flat mode: no subdirectories
            (tree._files || []).sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
              const el=document.createElement('div');el.className='file-item';
              if(f.path===openPath)el.classList.add('active');
              el.dataset.path=f.path;
              const bl=f.links?f.links.length:0;
              const orphanLabel = f._orphan ? '<span class="fi-orphan" title="No connections">○</span>' : '';
              el.innerHTML=`<span class="fi-icon">📄</span><span class="fi-name">${f.name}</span>${bl?`<span class="fi-links">${bl}→</span>`:''}${orphanolLabel}`;
              el.addEventListener('click',()=>openNote(f.path));
              fileListEl.appendChild(el);
            });
          }
          fileCountEl.textContent=`${count} note${count!==1?'s':''}`;
        }

        let searchTimeout = null;
        sbSearch.addEventListener('input', () => {
          renderFileList(sbSearch.value);
          if (searchTimeout) clearTimeout(searchTimeout);
          searchTimeout = setTimeout(async () => {
            const q = sbSearch.value.trim();
            if (q.length < 2) return;
            try {
              const apiResults = await API.get('/api/search?q=' + encodeURIComponent(q));
              const existingNames = new Set(files.filter(f => f.name.toLowerCase().includes(q)).map(f => f.name));
              const extra = apiResults.filter(r => !existingNames.has(r.name));
              if (extra.length === 0) return;
              extra.forEach(r => {
                const el = document.createElement('div'); el.className = 'file-item';
                el.dataset.path = r.path;
                el.innerHTML = `<span class="fi-icon">🔍</span><span class="fi-name">${r.name}</span><span style="font-size:10px;color:var(--text-dim)">content</span>`;
                el.addEventListener('click', () => openNote(r.path));
                fileListEl.appendChild(el);
              });
            } catch {}
          }, 250);
        });

        // ─── Note Templates ──────────────────────────────────────
        const TEMPLATES = {
          'Empty': '',
          'Journal': `# ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}\n\n## Today\n\n- \n\n## Notes\n\n`,
          'Meeting Notes': `# Meeting: \n\n**Date:** ${new Date().toLocaleDateString()}\n**Attendees:** \n\n## Agenda\n\n1. \n\n## Discussion\n\n\n## Action Items\n\n- [ ] \n`,
          'Task List': `# Tasks\n\n## Today\n\n- [ ] \n\n## This Week\n\n- [ ] \n\n## Backlog\n\n- [ ] \n`,
        };

        newBtn.addEventListener('click', async () => {
          const templateKeys = Object.keys(TEMPLATES);
          const tpl = prompt(`Note name (optional — type name, or just OK for empty):`);
          if (tpl === null) return;
          const parts = tpl.split('::');
          let name = parts[0].trim() || 'Untitled';
          let templateKey = parts[1] ? parts[1].trim() : '';
          if (!templateKey) {
            const choice = prompt(`Pick template: ${templateKeys.join(', ')}`);
            if (choice && TEMPLATES[choice]) templateKey = choice;
          }
          const content = TEMPLATES[templateKey] || '';
          try {
            const r = await API.post('/api/files', { name, content });
            await loadData();
            showToast(`Created "${name}"`);
            openNote(r.path);
          } catch(e) { showToast('Error creating note', '⚠️'); }
        });

        // ─── Theme Toggle ─────────────────────────────────────────
        const themeBtn = document.getElementById('theme-btn');
        let isLight = localStorage.getItem('mb-theme') === 'light';
        if (isLight) { document.documentElement.classList.add('light'); themeBtn.textContent = '🌙'; }
        themeBtn.addEventListener('click', () => {
          isLight = !isLight;
          document.documentElement.classList.toggle('light', isLight);
          themeBtn.textContent = isLight ? '🌙' : '☀';
          localStorage.setItem('mb-theme', isLight ? 'light' : 'dark');
        });

        // ─── Recent Notes (localStorage) ─────────────────────────
        function getRecent() {
          try { return JSON.parse(localStorage.getItem('mb-recent') || '[]'); } catch { return []; }
        }
        function addRecent(name, path) {
          let rec = getRecent().filter(r => r.path !== path);
          rec.unshift({ name, path, ts: Date.now() });
          if (rec.length > 10) rec = rec.slice(0, 10);
          localStorage.setItem('mb-recent', JSON.stringify(rec));
          renderRecent();
        }
        function renderRecent() {
          const rec = getRecent();
          const el = document.getElementById('recent-section');
          const list = document.getElementById('recent-list');
          if (rec.length === 0) { el.style.display = 'none'; return; }
          el.style.display = '';
          list.innerHTML = rec.map(r =>
            `<div class="recent-item" data-path="${CSS.escape(r.path)}"><span class="ri-icon">↩</span>${r.name}</div>`
          ).join('');
          list.querySelectorAll('.recent-item').forEach(it => {
            it.addEventListener('click', () => openNote(it.dataset.path));
          });
        }

        // ─── Status Bar ───────────────────────────────────────────
        const sbStatus = document.getElementById('sb-status');
        const sbFiles = document.getElementById('sb-files');
        const sbLinks = document.getElementById('sb-links');
        function updateStatusBar(connected) {
          sbStatus.textContent = connected ? '● Connected' : '○ Offline';
          sbStatus.className = connected ? 'sb-online' : 'sb-offline';
          if (files) sbFiles.textContent = `${files.length} note${files.length!==1?'s':''}`;
          if (edges) sbLinks.textContent = `${edges.length} link${edges.length!==1?'s':''}`;
        }

        // ─── Toast ───────────────────────────────────────────────
        const toast=document.getElementById('toast');
        let tt;
        function showToast(m,i='📄'){toast.innerHTML=`<span style="margin-right:5px">${i}</span>${m}`;toast.classList.add('show');if(tt)clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),2500);}

        // ─── Tag Cloud ───────────────────────────────────────────
        let selectedTag = null;
        let tagData = {};

        function renderTagCloud() {
          const el = document.getElementById('tag-list');
          const tags = Object.entries(tagData).sort((a,b) => b[1]-a[1]);
          if (tags.length === 0) { el.innerHTML = '<span style="font-size:11px;color:var(--text-dim)">No tags</span>'; return; }
          el.innerHTML = tags.map(([t,c]) =>
            `<span class="tag-item${selectedTag===t?' active':''}" data-tag="${t}">#${t}<span class="tag-count">${c}</span></span>`
          ).join('');
          el.querySelectorAll('.tag-item').forEach(el => {
            el.addEventListener('click', () => {
              const t = el.dataset.tag;
              selectedTag = selectedTag === t ? null : t;
              renderTagCloud();
              renderFileList(sbSearch.value);
            });
          });
        }

        document.getElementById('tag-toggle').addEventListener('click', () => {
          const tc = document.getElementById('tag-cloud');
          const tl = document.getElementById('tag-list');
          const toggler = document.getElementById('tag-toggle');
          if (tl.style.display === 'none') {
            tl.style.display = ''; toggler.textContent = '▾ hide';
          } else {
            tl.style.display = 'none'; toggler.textContent = '▸ show';
          }
        });

        // ─── Load data from API ──────────────────────────────────
        async function loadData() {
          try {
            const status = await API.get('/api/status');
            vaultNameEl.textContent = 'Vault: ' + status.vault.split(/[\\/]/).pop();
            files = await API.get('/api/files');
            fileMap.clear();
            files.forEach(f => fileMap.set(f.path, f));
            const graph = await API.get('/api/graph');
            edges = graph.edges || [];
            // Compute orphan data
            const linkedSet = new Set();
            edges.forEach(e => { linkedSet.add(e.source); linkedSet.add(e.target); });
            files.forEach(f => f._orphan = f.path && !linkedSet.has(f.path));
            buildGraph(files, edges);
            renderFileList(sbSearch.value);
            tagData = await API.get('/api/tags');
            renderTagCloud();
            document.getElementById('hud-count').textContent = `${files.length} note${files.length!==1?'s':''}`;
            document.getElementById('hud-links').textContent = `${edges.length} connection${edges.length!==1?'s':''}`;
            renderRecent();
            updateStatusBar(true);
            return true;
          } catch(e) {
            document.getElementById('hud-count').textContent = 'Offline';
            document.getElementById('hud-links').textContent = '';
            updateStatusBar(false);
            showToast('Cannot reach server. Is the backend running?', '⚠️');
            return false;
          }
        }

        // ─── Poll for external changes ───────────────────────────
        let lastPoll = 0;
        async function pollChanges() {
          try {
            const fresh = await API.get('/api/files');
            // Check if any files changed
            const changed = fresh.find(f => {
              const old = fileMap.get(f.path);
              return !old || old.mtime !== f.mtime;
            });
            if (changed) {
              const prevLen = files.length;
              files = fresh;
              fileMap.clear();
              files.forEach(f => fileMap.set(f.path, f));
              if (files.length !== prevLen) {
                const graph = await API.get('/api/graph');
                edges = graph.edges || [];
                buildGraph(files, edges);
              }
              renderFileList(sbSearch.value);
              tagData = await API.get('/api/tags');
              renderTagCloud();
              document.getElementById('hud-count').textContent = `${files.length} note${files.length!==1?'s':''}`;
              document.getElementById('hud-links').textContent = `${edges.length} connection${edges.length!==1?'s':''}`;
              renderRecent();
              updateStatusBar(true);
              // Reload open note if changed externally
              if (openPath && edPreview.innerHTML) {
                const data = await API.get('/api/files/' + encodeURIComponent(openPath));
                const newHtml = renderMD(data.content || '');
                if (newHtml !== edPreview.innerHTML) {
                  edPreview.innerHTML = newHtml;
                  edStatus.textContent = 'Updated from disk';
                }
              }
            }
          } catch {}
        }

        // ─── Animation ───────────────────────────────────────────
        function animate() {
          const t = performance.now()/1000;
          floatingPages.forEach(p=>{
            const d=p.userData, et=t*d.speed;
            p.position.x=d.baseX+Math.sin(et*0.7+d.phaseX)*d.floatAmp*0.15;
            p.position.y=d.baseY+Math.sin(et*0.9+d.phaseY)*d.floatAmp*0.2;
            p.position.z=d.baseZ+Math.cos(et*0.6+d.phaseZ)*d.floatAmp*0.15;
            p.rotation.x+=d.rotSpeedX*0.5+Math.sin(et*0.5+d.phaseX)*0.0005;
            p.rotation.y+=d.rotSpeedY*0.5+Math.sin(et*0.4+d.phaseY)*0.0005;
            p.rotation.z+=d.rotSpeedZ*0.5+Math.cos(et*0.6+d.phaseZ)*0.0005;
            const isActive = d.filePath === openPath;
            const breathe = 1+Math.sin(et*0.3+d.phaseX)*0.015;
            const s = isActive ? 1.4 + Math.sin(et*0.6)*0.06 : breathe;
            p.scale.set(s, isActive ? 1.4 + Math.sin(et*0.6+0.5)*0.06 : 1, s);
          });
          bg.position.y=-0.4+Math.sin(t*0.4)*0.06;
          bg.rotation.z=Math.sin(t*0.25)*0.015;
          bg.rotation.x=Math.sin(t*0.35)*0.008;
          pm.rotation.y+=0.0002; sm.rotation.y-=0.0003;
          controls.update();
          renderer.render(scene,camera);
          requestAnimationFrame(animate);
        }

        // ─── Init ────────────────────────────────────────────────
        async function init() {
          const ok = await loadData();
          if (ok) showToast(`Loaded ${files.length} notes`, '✦');
          updateStatusBar(true);
          renderRecent();
          animate();
          setInterval(pollChanges, 3000);
          // Register service worker
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          }
        }

        init();

        window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

        console.log('✦ Magmabase fullstack — backend API connected');
    </script>
</body>
</html>
